name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kucingemas
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kucingemas/attendance-app:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.vps.yml,Makefile,.env.prod"
          target: "~/attendance-app"
          rm: false

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/attendance-app

            # Rename docker-compose.vps.yml to docker-compose.yml di server
            mv docker-compose.vps.yml docker-compose.yml

            # Setup .env dari .env.prod dan secrets
            cp .env.prod .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "APP_URL=${{ secrets.APP_URL }}" >> .env
            # Pastikan HOST_PORT tetap 9001 jika belum ada di .env.prod
            grep -q "HOST_PORT" .env || echo "HOST_PORT=9001" >> .env

            # Pastikan network shared sudah ada
            docker network create web-proxy || true

            # Login ke Docker
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u kucingemas --password-stdin

            # Jalankan deployment menggunakan Makefile
            make pull
            make up
