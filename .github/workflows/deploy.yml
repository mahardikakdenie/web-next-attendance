name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kucingemas
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kucingemas/attendance-app:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.vps.yml,Makefile,.env.prod"
          target: "~/attendance-app"
          rm: false

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Pastikan folder tujuan bersih dan siap
            mkdir -p ~/attendance-app
            cd ~/attendance-app

            # 2. Paksa sinkronisasi Docker Compose
            # Kita timpa docker-compose.yml dengan versi VPS terbaru
            if [ -f docker-compose.vps.yml ]; then
                mv -f docker-compose.vps.yml docker-compose.yml
                echo "✅ docker-compose.yml has been updated from docker-compose.vps.yml"
            fi

            # 3. Paksa sinkronisasi .env (Hapus yang lama, buat baru dari .env.prod + Secrets)
            # Ini memastikan tidak ada sisa konfigurasi manual yang tertinggal
            cat .env.prod > .env
            echo "" >> .env
            echo "# --- Dynamic Secrets from GitHub ---" >> .env
            echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
            echo "APP_URL=${{ secrets.APP_URL }}" >> .env
            echo "HOST_PORT=9001" >> .env
            echo "✅ .env has been synchronized with .env.prod and GitHub Secrets"

            # 4. Pastikan Network Shared ada
            docker network create web-proxy || true

            # 5. Login & Update Container
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u kucingemas --password-stdin
            
            echo "🚀 Pulling latest images..."
            make pull
            
            echo "🔄 Restarting containers..."
            make up
            
            echo "📊 Current Status:"
            make status
