name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - master # Sesuaikan dengan nama branch utama Anda

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kucingemas
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kucingemas/attendance-app:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.vps.yml,Makefile"
          target: "~/attendance-app"
          rm: false # Jangan hapus file lain di folder tersebut

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Pindah ke direktori aplikasi
            cd ~/attendance-app

            # Buat file .env secara otomatis dari GitHub Secrets
            cat <<EOF > .env
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            API_URL=${{ secrets.API_URL }}
            INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
            SIGN_SECRET=${{ secrets.SIGN_SECRET }}
            APP_URL=${{ secrets.APP_URL }}
            NODE_ENV=production
            PORT=3000
            EOF

            # Login ke Docker (wajib jika repo private)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u kucingemas --password-stdin

            # Eksekusi deployment menggunakan Makefile
            make pull
            make up
