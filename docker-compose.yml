services:
  attendance-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    container_name: attendance-app
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - .env
    restart: always
